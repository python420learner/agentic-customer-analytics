services:
  postgres:
    image: postgres:16-alpine
    container_name: aca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aca_user
      POSTGRES_PASSWORD: aca_password
      POSTGRES_DB: aca_db
    ports:
      - "5433:5432"
    volumes:
      - aca_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aca_redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  aca_postgres_data: